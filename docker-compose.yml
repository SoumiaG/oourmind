version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: - |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      - MISTRAL_API_KEY=\${MISTRAL_API_KEY}
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: - |
        FROM node:20-slim
        WORKDIR /app
        COPY package.json .
        RUN npm install
        COPY . .
        CMD ["npm", "run", "dev", "--", "--host"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
